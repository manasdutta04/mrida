name: Build & Release APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true
          
      - name: Get dependencies
        run: flutter pub get
        working-directory: flutter_app

      - name: Create .env placeholder
        run: touch .env
        working-directory: flutter_app

      - name: Create google-services.json
        shell: python
        run: |
          import os
          import base64
          import json

          secret = os.environ.get('GOOGLE_SERVICES_JSON', '').strip()
          if not secret:
              print("::error::GOOGLE_SERVICES_JSON secret is empty or not set!")
              exit(1)

          path = 'flutter_app/android/app/google-services.json'
          os.makedirs(os.path.dirname(path), exist_ok=True)

          # Try parsing as raw JSON first
          try:
              json_data = json.loads(secret)
              with open(path, 'w') as f:
                  json.dump(json_data, f)
              print(f"Successfully created {path} from RAW JSON")
          except json.JSONDecodeError:
              # Try Base64 decode
              try:
                  decoded = base64.b64decode(secret)
                  json_data = json.loads(decoded)
                  with open(path, 'wb') as f:
                      f.write(decoded)
                  print(f"Successfully created {path} from BASE64")
              except Exception as e:
                  print(f"::error::Failed to parse GOOGLE_SERVICES_JSON as either RAW JSON or BASE64: {str(e)}")
                  exit(1)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        
      - name: Build APK
        # We inject ALL keys here using --dart-define. 
        # This "bakes" them into the binary for a true zero-config, secure release.
        run: |
          flutter build apk --release \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --dart-define=FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }} \
            --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }} \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }} \
            --dart-define=FIREBASE_ANDROID_APP_ID=${{ secrets.FIREBASE_ANDROID_APP_ID }} \
            --dart-define=FIREBASE_IOS_APP_ID=${{ secrets.FIREBASE_IOS_APP_ID }} \
            --dart-define=BACKEND_URL=${{ secrets.BACKEND_URL }} \
            --dart-define=SCAN_MODE=${{ secrets.SCAN_MODE }} \
            --dart-define=OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}
        working-directory: flutter_app
        
      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/mrida-android.apk
        working-directory: flutter_app

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: flutter_app/build/app/outputs/flutter-apk/mrida-android.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
