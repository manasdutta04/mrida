name: mrida
description: MRIDA soil health app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  go_router: ^17.2.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  google_sign_in: ^7.2.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  firebase_analytics: ^12.3.0
  hive_flutter: ^1.1.0
  camera: ^0.12.0+1
  image_picker: ^1.0.7
  image: ^4.1.7
  dio: ^5.4.1
  geolocator: ^14.0.2
  flutter_tts: ^4.2.5
  http: ^1.2.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.8.1
  intl: ^0.20.2
  connectivity_plus: ^7.1.1
  path_provider: ^2.1.2
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.17
  flutter_dotenv: ^6.0.1
  geocoding: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  freezed: ^3.2.3
  json_serializable: ^6.7.1
  riverpod_generator: ^4.0.0+1
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/demo/
    - assets/demo/images/
    - assets/branding/
    - assets/data/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/mrida_app_icon.png
  adaptive_icon_background: "#FAF9F6"
  adaptive_icon_foreground: assets/branding/mrida_app_icon.png
