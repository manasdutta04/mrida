name: mrida
description: MRIDA soil health app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.0
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  google_sign_in: ^6.2.1
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.9
  firebase_analytics: ^10.8.9
  hive_flutter: ^1.1.0
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  image: ^4.1.7
  dio: ^5.4.1
  geolocator: ^11.0.0
  flutter_tts: ^3.8.5
  http: ^1.2.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  intl: ^0.20.2
  connectivity_plus: ^5.0.2
  path_provider: ^2.1.2
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/demo/
    - assets/demo/images/
    - assets/branding/
    - assets/data/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/mrida_app_icon.png
  adaptive_icon_background: "#FAF9F6"
  adaptive_icon_foreground: assets/branding/mrida_app_icon.png
