name: mrida
description: MRIDA soil health app
publish_to: "none"
version: 1.0.2+3

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^10.1.2
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.1.0
  firebase_analytics: ^11.2.0
  hive_flutter: ^1.1.0
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  image: ^4.2.0
  dio: ^5.5.0
  geolocator: ^12.0.0
  flutter_tts: ^4.0.2
  http: ^1.2.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  path_provider: ^2.1.3
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  flutter_dotenv: ^5.1.0
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  freezed: ^3.1.0
  json_serializable: ^6.7.1
  riverpod_generator: ^2.6.4
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/demo/
    - assets/demo/images/
    - assets/branding/
    - assets/data/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/mrida_app_icon.png
  adaptive_icon_background: "#FAF9F6"
  adaptive_icon_foreground: assets/branding/mrida_app_icon.png
