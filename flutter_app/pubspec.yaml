name: mrida
description: MRIDA soil health app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.0
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.9
  firebase_analytics: ^10.8.9
  hive_flutter: ^1.1.0
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  image: ^4.1.7
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0
  flutter_tts: ^3.8.5
  dio: ^5.4.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  intl: ^0.19.0
  connectivity_plus: ^5.0.2
  path_provider: ^2.1.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/demo/
    - assets/demo/images/
